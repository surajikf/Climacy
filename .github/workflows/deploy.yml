name: Deploy Outreach App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Ownership
        run: |
          sudo chown -R ikf-support:www-data /var/www/apps/outreach
          sudo chmod -R 775 /var/www/apps/outreach

      - name: Pull Latest Code
        run: |
          cd /var/www/apps/outreach
          git fetch origin
          git reset --hard origin/main

      - name: Install Dependencies
        run: |
          cd /var/www/apps/outreach
          npm install

      - name: Generate Prisma Client
        run: |
          cd /var/www/apps/outreach
          npx prisma generate

      - name: Build Next.js Application
        run: |
          cd /var/www/apps/outreach
          npm run build

      - name: Restart PM2
        run: |
          cd /var/www/apps/outreach
          pm2 restart outreach --update-env

      - name: Save PM2
        run: |
          pm2 save
